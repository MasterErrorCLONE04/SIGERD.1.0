version: "2"
type: backend
tech_stack:
  - PHP
  - Laravel 12
  - Tailwind CSS
  - AlpineJS
routes:
  - path: /login
    file: routes/auth.php
    auth_required: false
    description: User login page
  - path: /dashboard
    file: routes/web.php
    auth_required: true
    description: Main dashboard redirecting by role
  - path: /admin/dashboard
    file: app/Http/Controllers/Admin/DashboardController.php
    auth_required: true
    description: Admin Dashboard
  - path: /admin/users
    file: app/Http/Controllers/Admin/UserController.php
    auth_required: true
    description: User Management for Admins
  - path: /admin/tasks
    file: app/Http/Controllers/Admin/TaskController.php
    auth_required: true
    description: Task Management for Admins
  - path: /instructor/dashboard
    file: app/Http/Controllers/Instructor/DashboardController.php
    auth_required: true
    description: Instructor Dashboard
  - path: /instructor/incidents
    file: app/Http/Controllers/Instructor/IncidentController.php
    auth_required: true
    description: Incidents reported by Instructors
  - path: /worker/dashboard
    file: app/Http/Controllers/Worker/DashboardController.php
    auth_required: true
    description: Worker Dashboard
  - path: /worker/tasks
    file: app/Http/Controllers/Worker/TaskController.php
    auth_required: true
    description: Tasks assigned to Workers
features:
  - name: Authentication
    description: Login, Register, Profile Management
    files:
      - routes/auth.php
      - app/Http/Controllers/ProfileController.php
    entry_route: /login
    user_interactions:
      - Fill email and password
      - Click login
    api_calls: []
    auth_required: false
  - name: Role-Based Dashboards
    description: Different dashboards based on user role (Admin, Instructor, Worker)
    files:
      - routes/web.php
    entry_route: /dashboard
    user_interactions:
      - View overview metrics
    api_calls: []
    auth_required: true
  - name: User Management
    description: CRUD for system users by Administrator
    files:
      - app/Http/Controllers/Admin/UserController.php
    entry_route: /admin/users
    user_interactions:
      - View list of users
      - Create new user
      - Edit user
      - Delete user
    api_calls: []
    auth_required: true
  - name: Incident Management
    description: Instructors report incidents, Admins review them and can convert to Tasks
    files:
      - app/Http/Controllers/Admin/IncidentController.php
      - app/Http/Controllers/Instructor/IncidentController.php
    entry_route: /instructor/incidents
    user_interactions:
      - Create incident
      - View incident details
      - Convert incident to task (Admin)
    api_calls: []
    auth_required: true
  - name: Task Management
    description: Admins assign tasks to Workers, Workers update the status of tasks
    files:
      - app/Http/Controllers/Admin/TaskController.php
      - app/Http/Controllers/Worker/TaskController.php
    entry_route: /worker/tasks
    user_interactions:
      - View assigned tasks
      - Update task status to in-progress or completed
      - Review completed tasks (Admin)
      - Export to PDF (Admin)
    api_calls: []
    auth_required: true
known_limitations: []
